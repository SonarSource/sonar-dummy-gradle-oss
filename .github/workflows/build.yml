name: Build
on:
  push:
    branches:
      - master
      - branch-*
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CACHE_BACKEND: s3

jobs:
  get-build-number:
    outputs:
      BUILD_NUMBER: ${{ steps.get-build-number.outputs.BUILD_NUMBER }}
    runs-on: sonar-xs
    name: Get build number
    permissions:
      id-token: write
    steps:
      - uses: SonarSource/ci-github-actions/get-build-number@master # dogfood
        id: get-build-number

  build:
    runs-on: sonar-s
    name: Build
    permissions:
      id-token: write
      contents: write
      attestations: write
    needs: get-build-number
    env:
      BUILD_NUMBER: ${{ needs.get-build-number.outputs.BUILD_NUMBER }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2025.12.13
      - name: Build, Analyze and deploy
        id: build
        uses: SonarSource/ci-github-actions/build-gradle@master # dogfood
        with:
          deploy-pull-request: true
          artifactory-reader-role: private-reader
          artifactory-deployer-role: qa-deployer
          use-develocity: true
          provenance: 'true'
      - name: verify build-gradle behavior
        env:
          DEPLOYED: ${{ steps.build.outputs.deployed }}
        run: |
          if [[ "$DEPLOYED" != "true" ]]; then
              echo "ERROR: steps.build.outputs.deployed is not true"
              exit 1
          fi
      - name: QA test
        shell: bash
        env:
          SONARSOURCE_REPOSITORY: sonarsource-qa
        run: |
          # Removing local artifacts to showcase downloading from sonarsource-qa
          ./gradlew --stop
          rm -rf ~/.gradle/caches/modules-2/files-2.1/org.sonarsource.sonarqube/sonar-plugin-api/
          echo "Running QA tests against $ARTIFACTORY_URL/$SONARSOURCE_REPOSITORY..."
          ./gradlew test --info --no-scan | tee qa-test.log
          grep "Downloading https://repox.jfrog.io/artifactory/sonarsource-qa/org/sonarsource/sonarqube/sonar-plugin-api/" qa-test.log

  test-working-directory:
    runs-on: sonar-s
    name: Test with working-directory
    permissions:
      id-token: write
      contents: write
    needs:
      - get-build-number
      - build
    env:
      BUILD_NUMBER: ${{ needs.get-build-number.outputs.BUILD_NUMBER }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: subdir
      - name: Workaround for setup-gradle which has no working-directory input
        run: |
          cp subdir/mise.toml mise.toml
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2025.12.13
      - uses: SonarSource/ci-github-actions/config-gradle@master # dogfood
        with:
          use-develocity: false
          artifactory-reader-role: private-reader
          working-directory: subdir
      - working-directory: subdir
        run: ./gradlew test

  build-windows:
    runs-on: warp-custom-windows-2022-s
    name: Build Windows
    permissions:
      id-token: write
      contents: write
      attestations: write
    needs: get-build-number
    env:
      BUILD_NUMBER: ${{ needs.get-build-number.outputs.BUILD_NUMBER }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2025.12.13
      - uses: SonarSource/ci-github-actions/build-gradle@master # dogfood
        id: build
        with:
          deploy: false
          artifactory-reader-role: private-reader
          artifactory-deployer-role: qa-deployer
          use-develocity: true
          provenance: 'true'
      - name: verify build-gradle behavior
        shell: bash
        env:
          DEPLOYED: ${{ steps.build.outputs.deployed }}
        run: |
          if [[ "$DEPLOYED" = "true" ]]; then
              echo "ERROR: steps.build.outputs.deployed is true"
              exit 1
          fi

  report-ci-metrics:
    needs:
      - build
      - test-working-directory
      - build-windows
    if: always() && (github.event_name == 'pull_request' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    runs-on: sonar-xs
    name: Report CI metrics
    permissions:
      actions: read
      pull-requests: write
    steps:
      - uses: SonarSource/ci-github-actions/report-ci-metrics@master # dogfood

  promote:
    needs:
      - get-build-number
      - build
      - build-windows
      - test-working-directory
    runs-on: github-ubuntu-latest-s
    name: Promote
    permissions:
      id-token: write
      contents: write
    env:
      BUILD_NUMBER: ${{ needs.get-build-number.outputs.BUILD_NUMBER }}
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: SonarSource/ci-github-actions/promote@master # dogfood
        with:
          promote-pull-request: true
